<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HOSTERA</title>
  <style>
    :root{
      --bg1:#FFFFFF;
      --bg2:#FFFFFF;
      --card:rgba(255, 255, 255, 0.95);
      --card2:#FFFFFF;
      --stroke:#E0E0E0;
      --stroke2:#CCCCCC;
      --text:#000000;
      --muted:#666666;
      --muted2:#999999;
      --chip:#F5F5F5;
      --chipActive:#E8F5E9;
      --good:#2f9d6a;
      --accent:#2f9d6a;
      --accentSoft:#4CAF50;
      --track:#EFE7DE;
      --shadow:0 2px 8px rgba(0,0,0,0.06);
      --radius:16px;
      --radius2:12px;
      --pad:24px;
      --gap:16px;
      --font: 'Proxima Nova', sans-serif;
    }
    :root[data-theme="dark"]{
      --bg1:#000000;
      --bg2:#000000;
      --card:rgba(30, 30, 30, 0.95);
      --card2:#2C2C2C;
      --stroke:#333333;
      --stroke2:#444444;
      --text:#FFFFFF;
      --muted:#B0B0B0;
      --muted2:#808080;
      --chip:#2C2C2C;
      --chipActive:#1B3A1F;
      --good:#4CAF50;
      --accent:#4CAF50;
      --accentSoft:#66BB6A;
      --track:#2C2C2C;
      --shadow:0 2px 8px rgba(0,0,0,0.3);
    }
    *{
      font-family: var(--font);
    }
    body{
      margin:0;
      background: var(--bg1);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    .wrap{
      max-width:1240px;
      margin:0 auto;
      padding:22px 18px 70px;
    }
    .topbar{
      position: sticky;
      top: 0;
      z-index: 100;
      display:flex;
      align-items:center;
      justify-content:flex-start;
      height: 80px;
      gap:24px;
      padding:0 18px;
      margin-bottom:14px;
      border:1px solid var(--stroke);
      background: rgba(255, 255, 255, 0.85);
      border-radius: var(--radius);
      box-shadow: none;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:24px;
      min-width:auto;
      flex-shrink:0;
    }
    .brand img{
      width:60px;
      height:60px;
      border-radius: 12px;
      object-fit:contain;
      background: #ECE7E1;
      border:none;
      padding:0;
      box-sizing: border-box;
    }
    .brand .title{
      display:flex;
      flex-direction:column;
      line-height:1.1;
    }
    .brand .title b{
      font-size: 22px;
      font-weight: 600;
      color: #1D1D1F;
      letter-spacing:0.2px;
    }
    .brand .title span{
      font-size: 12px;
      color: var(--muted);
    }
    .topMenuNav{
      display:flex;
      align-items:center;
      gap:8px;
      overflow-x:auto;
      scrollbar-width:none;
      flex-shrink:0;
      margin-right:24px;
    }
    .topMenuNav::-webkit-scrollbar{
      display:none;
    }
    .topMenuItem{
      height:36px;
      padding:0 16px;
      border:none;
      border-radius:999px;
      background: transparent;
      color:#3A3A3C;
      font-size:16px;
      font-weight:450;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      white-space:nowrap;
      cursor:pointer;
      transition: background-color 180ms ease, color 180ms ease;
    }
    .topMenuItem:hover:not([disabled]):not(.active){
      background: rgba(0,0,0,0.04);
    }
    .topMenuItem.active{
      background:#EDE6DD;
      color:#1D1D1F;
      font-weight:500;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    }
    .topMenuItem[disabled]{
      opacity:0.5;
      cursor:not-allowed;
    }
    .controls{
      display:flex;
      align-items:center;
      gap:16px;
      flex-wrap:nowrap;
      justify-content:flex-end;
      position:relative;
      flex-shrink:0;
    }
    .topbar.inventoryModeTopbar .controls{
      margin-left:auto;
    }
    .searchWrap{
      position:relative;
      width:96px;
      height:36px;
      border-radius: var(--radius);
      background:#EFEAE4;
      border:1px solid #D5CFC7;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0 8px;
      box-sizing:border-box;
    }
    .searchWrap:focus-within{
      background:#E8E2DA;
      border-color:#CCBDB3;
    }
    .searchWrap #searchInput{
      width:100%;
      height:100%;
      border:none;
      background:transparent;
      outline:none;
      color:var(--text);
      font-size:16px;
      font-weight:450;
      padding:0;
      box-sizing:border-box;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      text-align:center;
    }
    .searchWrap #searchInput::placeholder{
      color:#8E8E93;
      opacity:1;
    }
    .searchIcon{
      display:none;
    }
    .settingsBtn{
      height:36px;
      border-radius: var(--radius);
      border:1px solid #D5CFC7;
      background:#EFEAE4;
      color:#6E6E73;
      font-size:16px;
      font-weight:450;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:0 16px;
      cursor:pointer;
      transition: background-color 120ms ease, border-color 120ms ease;
    }
    .settingsBtn:hover{
      background:#E8E2DA;
      border-color:#CCBDB3;
    }
    .settingsBtn:active{
      background:#DDD5CC;
    }
    .settingsPanel{
      position:absolute;
      top: calc(100% + 8px);
      right:0;
      min-width:150px;
      padding:8px;
      display:none;
      flex-direction:column;
      gap:4px;
      border-radius:12px;
      border:1px solid var(--stroke);
      background: var(--card);
      box-shadow: var(--shadow);
      z-index:120;
    }
    .settingsPanel.open{
      display:flex;
    }
    .settingsAction{
      height:34px;
      border:none;
      border-radius:8px;
      background:transparent;
      color:var(--text);
      font-size:14px;
      text-align:left;
      padding:0 10px;
      cursor:pointer;
    }
    .settingsAction:hover{
      background: var(--chip);
    }
    .hiddenControl{
      display:none !important;
    }
    .btn{
      cursor:pointer;
      border-radius: 12px;
      border: 1px solid var(--stroke);
      background: var(--chip);
      color: var(--text);
      padding: 7px 10px;
      font-size: 12px;
      min-width: 100px;
    }
    .btn:hover{
      border-color: var(--stroke2);
    }
    select, input{
      background: var(--card);
      border: 1px solid var(--stroke);
      color: var(--text);
      outline:none;
      border-radius: 12px;
      padding: 7px 10px;
      font-size: 12px;
      min-width: 100px;
    }
    .iconBtn{
      cursor:pointer;
      border-radius: 12px;
      border: 1px solid var(--stroke);
      background: var(--card);
      color: var(--text);
      padding: 6px 10px;
      font-size: 16px;
      line-height: 1;
      display: none; /* hidden by default */
    }
    .iconBtn:hover{
      border-color: var(--stroke2);
    }


    .status{
      font-size: 12px;
      color: var(--muted);
      padding: 7px 10px;
      border-radius: 999px;
      border:1px solid var(--stroke);
      background: var(--card);
      display:flex;
      align-items:center;
      gap:8px;
    }
    .dot{
      width:8px;height:8px;border-radius: 999px;
      background: rgba(255,255,255,0.35);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.06);
    }
    .dot.good{
      background: var(--good);
      box-shadow: 0 0 0 3px rgba(116,255,182,0.13);
    }

    .tabs{
      position: sticky;
      top: 80px;
      z-index: 99;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin: 12px 0 12px;
      padding: 12px 0;
    }

    [data-theme="dark"] .topbar{
      background: rgba(30, 30, 30, 0.85);
    }

    @media (max-width: 1024px){
      .searchWrap{ width:220px; }
    }
    @media (max-width: 767px){
      .topbar{ padding:0 18px; gap:12px; }
      .brand{ gap:12px; }
      .brand .title b{ font-size:18px; }
      .topMenuItem{ font-size:16px; }
      .searchWrap{ width:170px; }
    }

    /* chip as button (a11y) */
    .chip{
      cursor:pointer;
      user-select:none;
      padding:7px 12px;
      border-radius: 999px;
      border:1px solid var(--stroke);
      background: var(--chip);
      color: var(--muted);
      font-size: 12px;
      transition: 0.15s ease;
      text-transform: none;

      appearance:none;
      -webkit-appearance:none;
      outline:none;
    }
    .chip:hover{
      border-color: var(--stroke2);
      color: var(--text);
    }
    .chip.active{
      background: var(--chipActive);
      border-color: var(--accent);
      color: var(--accent);
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 460px));
      row-gap: 40px;
      column-gap: 72px;
      justify-content: center;
      justify-items: stretch;
      margin-top: 10px;
      padding: 0 18px;
    }
    .grid.pastryGrid{
      align-items: start;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      justify-items: center;
    }
    @media (max-width: 930px){
      .grid{ grid-template-columns: 1fr; }
      input{ min-width: 160px; }

      .card{ padding: 16px; }
      .cardLayout{ grid-template-columns: 1fr; gap: 16px; }
      .card:not(.pastryCard) .cardLayout{ width: 100%; max-width: none; }
      .bottleWrap{ min-height: 180px; padding: 12px; }
      .bottleImg{ max-height: 160px; }

      .name{ font-size: 13px; margin-bottom: 12px; }
      .infoRow{ grid-template-columns: 75px 1fr; gap: 8px; margin-bottom: 6px; }
      .infoLabel{ font-size: 9px; }
      .infoValue{ font-size: 11px; }

      .pastryCard .cardLayout{ grid-template-columns: 1fr; gap: 16px; }
      .pastryVisualWrap{ min-height: 240px; padding: 12px; }
      .pastryVisual{ width: 180px; height: 210px; font-size: 11px; }
      .pastryImg{ width: 180px; height: 210px; }
      .pastryTitle{ font-size: 20px; }
      .pastryDescription{ font-size: 16px; min-height: 0; }
      .pastryCard{ padding: 16px; }
    }
    @media (max-width: 680px){
      .card{ padding: 14px; }
      .cardLayout{ grid-template-columns: 1fr; gap: 14px; }
      .bottleWrap{ width: 100%; min-height: 160px; padding: 10px; }
      .bottleImg{ max-height: 140px; }
      .name{ font-size: 12px; }
      .infoRow{ grid-template-columns: 1fr; gap: 2px; margin-bottom: 6px; }

      .pastryCard .cardLayout{ grid-template-columns: 1fr; gap: 14px; }
      .pastryVisualWrap{ width: 100%; min-height: 200px; padding: 10px; }
      .pastryVisual{ width: 150px; height: 176px; font-size: 10px; }
      .pastryImg{ width: 150px; height: 176px; }
      .pastryTitle{ font-size: 18px; }
      .pastryDescription{ font-size: 15px; min-height: 0; }
      .pastryCard .divider{ margin: 12px 0; }
    }

    .card{
      position:relative;
      box-sizing: border-box;
      border-radius: var(--radius);
      border:1px solid var(--stroke);
      background: var(--card);
      box-shadow: none;
      padding: 14px;
      width: 100%;
      max-width: 460px;
      min-height: auto;
      overflow:hidden;
      transition: border-color 0.2s ease;
    }
    .card:hover{ border-color: var(--stroke2); }
    .cardLayout{
      display:grid;
      grid-template-columns: 88px 1fr;
      gap: 40px;
      align-items:start;
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
    }
    .card:not(.pastryCard) .cardLayout{
      width: calc(100% - 24px);
      max-width: 408px;
      margin: 0 auto;
    }
    .bottleWrap{
      width: 100%;
      height: auto;
      min-height: 200px;
      border-radius: var(--radius2);
      border: none;
      background: var(--bg2);
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 8px;
    }
    .bottleImg{
      max-height: 400px;
      max-width: 100%;
      object-fit: contain;
      transform: scale(1.2);
      transform-origin: center;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.08));
    }
    .meta{
      flex:1;
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:0;
    }
    .head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom: 24px;
    }
    .name{
      font-weight: 600;
      font-size: 14px;
      letter-spacing:0.3px;
      text-align: left;
      text-transform: uppercase;
      line-height: 1.25;
      margin-bottom: 10px;
      color: var(--text);
    }
    .titleProducer{
      font-weight: 600;
      font-size: 16px;
      letter-spacing: 0;
      text-transform: uppercase;
      color: #1d1d1f;
      margin-bottom: 6px;
      line-height: 1.2;
    }
    .titleWine{
      font-weight: 400;
      font-size: 16px;
      letter-spacing: 0;
      color: #86868b;
      line-height: 1.3;
      margin-bottom: 0;
    }
    .producer{
      display: none;
    }
    .sub{
      font-size: 14px;
      color: var(--muted);
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
    }
    .cardDesc{
      font-size: 14px;
      color: var(--muted);
      line-height: 1.4;
      margin-top: 10px;
      white-space: normal;
    }
    .pastryCard{
      max-width: 560px;
    }
    .pastryCard .cardLayout{
      grid-template-columns: 240px 1fr;
      gap: 24px;
      max-width: none;
      margin: 0 auto;
      align-items: start;
    }
    .pastryCard .meta{
      padding-top: 0;
    }
    .pastryVisualWrap{
      background: var(--bg2);
      border: none;
      min-height: 260px;
      padding: 8px;
      align-items: center;
    }
    .pastryImg{
      width: 216px;
      height: 252px;
      object-fit: cover;
      transform: none;
      border-radius: var(--radius2);
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.08));
    }
    .pastryVisual{
      width: 216px;
      height: 252px;
      border-radius: 24px;
      background: linear-gradient(170deg, #f7efe4 0%, #ead8c0 100%);
      border: 1px solid #deccb1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8a5d2d;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .pastryTitle{
      font-weight: 600;
      font-size: 20px;
      letter-spacing: 0;
      text-transform: none;
      color: #1d1d1f;
      margin-bottom: 6px;
      line-height: 1.2;
    }
    .pastryDescription{
      font-size: 16px;
      font-weight: 400;
      color: #86868b;
      line-height: 1.3;
      margin-bottom: 0;
      margin-top: 0;
    }
    .pastryPriceLine{
      font-size: 16px;
      font-weight: 600;
      color: #1d1d1f;
      line-height: 1.4;
      margin-bottom: 0;
      margin-top: 12px;
    }
    .pastryCard .dietaryBadges{
      margin-top: 6px;
    }
    .pastryCard .divider{
      margin: 12px 0;
    }
    .infoRow{
      display: grid;
      grid-template-columns: 70px 1fr;
      gap: 8px;
      align-items: baseline;
      margin-bottom: 8px;
    }
    .infoLabel{
      font-size: 12px;
      font-weight: 600;
      color: #000;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .infoValue{
      font-size: 12px;
      font-weight: 400;
      color: #000;
      letter-spacing: 0.2px;
      line-height: 1.35;
    }
    .infoLine{
      font-size: 16px;
      font-weight: 400;
      color: #1d1d1f;
      line-height: 1.4;
      margin-bottom: 0;
    }
    .infoLine .sep{
      color: #d2d2d7;
      margin: 0 8px;
    }
    .priceLine{
      font-size: 16px;
      font-weight: 600;
      color: #1d1d1f;
      line-height: 1.4;
      margin-bottom: 0;
      margin-top: 12px;
    }
    .priceLine .label{
      font-weight: 400;
      color: #1d1d1f;
    }
    .priceLine .value{
      font-size: 16px;
      font-weight: 600;
      color: #1d1d1f;
    }
    .priceLine .sep{
      color: #d2d2d7;
      margin: 0 10px;
    }
    .countryFlag{
      width: 28px;
      height: 20px;
      object-fit: cover;
      border: 1px solid #CCCCCC;
      margin-right: 8px;
    }
    .priceStack{
      text-align:right;
      min-width: 88px;
      line-height:1.1;
    }
    .priceBottle{
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
    }
    .priceGlass{
      display:block;
      font-size: 14px;
      color: var(--muted);
      font-weight: 400;
      margin-top: 4px;
    }
    .chips{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .chipTag{
      font-size: 12px;
      font-weight: 500;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid var(--stroke);
      background: var(--chip);
      color: var(--text);
    }
    .dietaryBadges{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin-top:8px;
    }
    .dietaryBadge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:28px;
      height:22px;
      padding:0 8px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background: var(--chip);
      color: var(--text);
      font-size:11px;
      font-weight:600;
      letter-spacing:0.2px;
    }
    .notes{
      display:grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(0, 1fr);
      gap:0;
      align-items:start;
      margin-top: 0;
      width: 100%;
    }
    .divider{
      height: 1px;
      background: #e5e5e7;
      margin: 12px 0;
      width: calc(100% - 70px);
    }
    .noteTag{
      display:flex;
      flex-direction: column;
      align-items:center;
      gap:10px;
      padding: 0 10px;
      min-width: 0;
      border-radius: 0;
      border: none;
      border-right: 1px solid #e5e5e7;
      background: transparent;
    }
    .noteTag:last-child{
      border-right: none;
    }
    .noteTag:first-child{
      padding-left: 0;
    }
    .noteIcon{
      width: 40px;
      height: 40px;
      object-fit: contain;
    }
    .noteLabel{
      font-size: 13.5px;
      font-weight: 400;
      text-transform: capitalize;
      color: #6e6e73;
      white-space: nowrap;
      text-align: center;
      line-height: 1.2;
      display: block;
      overflow: visible;
      text-overflow: clip;
    }

    .cardBtn{
      position:absolute;
      inset:0;
      cursor:pointer;
      background: transparent;
      border:0;
    }
    .modalBack{
      position:fixed;
      inset:0;
      background: rgba(0,0,0,0.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding: 18px;
      z-index: 50;
    }
    .modal{
      width: min(980px, 100%);
      border-radius: 22px;
      border: 1px solid var(--stroke);
      background: var(--bg1);
      box-shadow: 0 24px 60px rgba(0,0,0,0.35);
      overflow:hidden;
      color: var(--text);
    }
    .modalTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--stroke);
      color: var(--muted);
      font-size: 12px;
    }
    .modalBody{
      padding: 20px;
      display:grid;
      grid-template-columns: 38% 62%;
      gap:24px;
      align-items:flex-start;
      color: var(--text);
    }
    .modalLeft{
      display:flex;
      flex-direction:column;
      gap:14px;
    }
    .modalBottleWrap{
      height: 260px;
    }
    .modalText{
      min-width:0;
    }
    .modalText h2{
      margin: 0 0 8px 0;
      font-size: 27px;
      font-weight: 600;
      letter-spacing:0.2px;
    }
    .modalText .sub{
      margin-bottom: 12px;
      white-space: normal;
    }
    .modalText .price{
      font-size: 19px;
      font-weight: 500;
      margin-bottom: 16px;
      letter-spacing: 0.2px;
      line-height: 1.5;
    }
    .modalText .price > div{
      font-size: 19px;
      font-weight: 500;
    }
    .modalText .price small{
      display: block;
      font-size: 13px;
      font-weight: 400;
      margin-top: 2px;
      opacity: 0.6;
    }
    .modalProfile{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-bottom: 16px;
    }
    .profileRow{
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .profileLabel{
      font-size: 12px;
      color: var(--muted);
      display:flex;
      justify-content:space-between;
      align-items:center;
    }
    .profileTrack{
      position:relative;
      height: 6px;
      background: var(--track);

function t(key) {
  const lang = state?.lang || 'en';
  return UI_STRINGS[lang]?.[key] || UI_STRINGS.en?.[key] || key;
}

function inventoryStringsForLang(lang) {
  const locale = UI_STRINGS[lang]?.inventory || {};
  const fallback = UI_STRINGS.en.inventory || {};
  return { ...fallback, ...locale };
}

function validateInventoryI18nCoverage() {
  const placeholderTokens = (value) => {
    const tokens = new Set();
    String(value || '').replace(/\{(\w+)\}/g, (_, token) => {
      tokens.add(token);
      return _;
    });
    return Array.from(tokens).sort();
  };

  const enBase = UI_STRINGS.en?.inventory || {};
  const expectedKeys = Object.keys(enBase);
  const locales = Object.keys(UI_STRINGS || {}).filter((lang) => lang !== 'en');

  for (const lang of locales) {
    const locale = UI_STRINGS[lang]?.inventory || {};
    const missing = expectedKeys.filter((key) => {
      const value = locale[key];
      return value === undefined || value === null || value === '';
    });

    if (missing.length) {
      console.warn(`[Inventory i18n] Missing keys for ${lang}:`, missing);
    }

    const extra = Object.keys(locale).filter((key) => !expectedKeys.includes(key));
    if (extra.length) {
      console.warn(`[Inventory i18n] Extra keys for ${lang}:`, extra);
    }

    const placeholderMismatch = [];
    for (const key of expectedKeys) {
      const enTokens = placeholderTokens(enBase[key]);
      const localeTokens = placeholderTokens(locale[key]);
      if (enTokens.join('|') !== localeTokens.join('|')) {
        placeholderMismatch.push({ key, en: enTokens, locale: localeTokens });
      }
    }
    if (placeholderMismatch.length) {
      console.warn(`[Inventory i18n] Placeholder mismatch for ${lang}:`, placeholderMismatch);
    }
  }
}

function menuTitleForLang(menu) {
  if (!menu) return '';
  return menu.title || menu.key;
}

function applyLanguageUI() {
  const searchInput = $('searchInput');
  if (searchInput) searchInput.placeholder = t('search');

  const loginInput = $('loginInput');
  if (loginInput) loginInput.placeholder = t('login');

  const passwordInput = $('passwordInput');
  if (passwordInput) passwordInput.placeholder = t('password');

  const loginForm = $('loginForm');
  if (loginForm) {
    const signInBtn = loginForm.querySelector('button.btn');
    if (signInBtn) signInBtn.textContent = t('signIn');
  }

  const logoutBtn = $('logoutBtn');
  if (logoutBtn) logoutBtn.textContent = t('logout');

  const settingsBackToMenuBtn = $('settingsBackToMenuBtn');
  if (settingsBackToMenuBtn) settingsBackToMenuBtn.textContent = t('backToMenu');

  const settingsLogoutBtn = $('settingsLogoutBtn');
  if (settingsLogoutBtn) settingsLogoutBtn.textContent = t('logout');
}

function hasMenuCsv(menu) {
  if (menu?.key === INVENTORY_MENU_KEY || menu?.type === 'inventory') {
    return isInventoryFeatureEnabled();
  }
  return !!(menu?.csvUrl?.[state.lang] || menu?.csvUrl?.en);
}

function topMenuLabel(menu) {
  if (!menu) return '';
  if (menu.key === INVENTORY_MENU_KEY || menu.type === 'inventory') return 'Inventory';
  const title = String(menu.title || menu.key || '').trim();
  if (/wine\s+list/i.test(title)) return 'Wine';
  return title;
}

function renderTopMenuNav() {
  const nav = $('topMenuNav');
  if (!nav) return;
  nav.innerHTML = '';

  for (const menu of state.menus || []) {
    if (isInventoryMenu(menu)) continue;

    const button = document.createElement('button');
    button.type = 'button';
    button.className = 'topMenuItem' + (menu.key === state.menuKey ? ' active' : '');
    button.textContent = topMenuLabel(menu);

    const enabled = hasMenuCsv(menu);
    if (!enabled) {
      button.disabled = true;
      button.title = t('comingSoon');
    } else {
      button.onclick = async () => {
        await setMenu(menu.key);
      };
    }

    nav.appendChild(button);
  }
}

function closeSettingsMenu() {
  const panel = $('settingsPanel');
  const btn = $('settingsBtn');
  if (panel) {
    panel.classList.remove('open');
    panel.setAttribute('aria-hidden', 'true');
  }
  if (btn) btn.setAttribute('aria-expanded', 'false');
}

function goBackToMenuSelection() {
  state.menuKey = null;
  state.menuConfig = null;
  state.activeSection = 'all';
  closeModal(false);
  state.modalWineId = null;
  renderStartBranding();
  showStartScreen();
  $('loginForm').classList.add('hidden');
  $('menuList').classList.remove('hidden');
  renderMenuSelect();
  renderMenuList();
  writeUrlParams({ menu: null, w: null, section: 'all' }, 'push');
}

function bindSettingsMenu() {
  if (settingsMenuBound) return;

  const settingsBtn = $('settingsBtn');
  const settingsPanel = $('settingsPanel');
  const settingsThemeBtn = $('settingsThemeBtn');
  const settingsBackToMenuBtn = $('settingsBackToMenuBtn');
  const settingsLogoutBtn = $('settingsLogoutBtn');
  if (!settingsBtn || !settingsPanel || !settingsThemeBtn || !settingsBackToMenuBtn || !settingsLogoutBtn) return;

  settingsBtn.addEventListener('click', (e) => {
    e.preventDefault();
    const isOpen = settingsPanel.classList.contains('open');
    if (isOpen) {
      closeSettingsMenu();
      return;
    }
    settingsPanel.classList.add('open');
    settingsPanel.setAttribute('aria-hidden', 'false');
    settingsBtn.setAttribute('aria-expanded', 'true');
  });

  settingsThemeBtn.addEventListener('click', () => {
    toggleTheme();
    closeSettingsMenu();
  });

  settingsBackToMenuBtn.addEventListener('click', () => {
    closeSettingsMenu();
    goBackToMenuSelection();
  });

  settingsLogoutBtn.addEventListener('click', () => {
    closeSettingsMenu();
    const logoutBtn = $('logoutBtn');
    if (logoutBtn) logoutBtn.click();
  });

  document.addEventListener('click', (e) => {
    const panel = $('settingsPanel');
    const btn = $('settingsBtn');
    if (!panel || !btn) return;
    if (!panel.classList.contains('open')) return;
    if (panel.contains(e.target) || btn.contains(e.target)) return;
    closeSettingsMenu();
  });

  settingsMenuBound = true;
}

function resolveBottleSrc(url) {
  const u = normalizeAssetPath(url || '');
  return u ? u : PLACEHOLDER_BOTTLE;
}

function bindLogoutHandler() {
  if (logoutHandlerBound) return;
  const logoutBtnEl = $('logoutBtn');
  if (!logoutBtnEl) return;
  logoutBtnEl.addEventListener('click', (e) => {
    e.preventDefault();
    closeSettingsMenu();
    clearAuthState();
    state.restaurantId = null;
    state.config = null;
    state.menus = [];

    state.activeSection = 'all';

    showStartScreen();
    renderGlobalLoginForm();
    $('logoutBtn').style.display = 'none';
  }, { capture: true });

}

function normalizeAssetPath(path) {
  if (!path) return '';
  if (path.startsWith('http://') || path.startsWith('https://') || path.startsWith('data:')) return path;
  
  // Always use absolute path from /winegallery/ root since Pretty URLs can interfere with relative paths
  // For example: when URL is /novikov_bh, relative paths like assets/... become /novikov_bh/assets/
  if (path.startsWith('/')) {
    // Already absolute - check if it starts with /winegallery/, if not prepend it
    if (!path.startsWith('/winegallery/')) {
      return '/winegallery' + path;
    }
    return path;
  }
  
  // For relative paths like "assets/novikov-logo.png", prepend /winegallery/
  const fullPath = '/winegallery/' + path;
  return fullPath;
}

function normalizeSectionKey(input) {
  const raw = String(input ?? '').trim();
  if (!raw) return '';
  const noDiacritics = raw.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  const lowered = noDiacritics.toLowerCase();
  const cleaned = lowered.replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '');
  return cleaned;
}

function safe(v) {
  if (v === null || v === undefined) return '';
  return String(v);
}

function money(v) {
  const n = Number(v);
  if (!isFinite(n)) return '';
  const currency = state.config?.currency || 'USD';
  try {
    const formatted = new Intl.NumberFormat('en-US', {
      style: 'currency',
      currency: currency,
      minimumFractionDigits: 0,
      maximumFractionDigits: 0
    }).format(n);
    return formatted.replace('$', '$ ');
  } catch (e) {
    return `$ ${n}`;
  }
}

/**
 * =========================
 * 2) URL params (deep-links)
 * =========================
 */
function shouldUseHashRouting() {
  return window.location.hostname === '127.0.0.1'
    || window.location.hostname === 'localhost'
    || window.location.protocol === 'file:';
}

function readRoute() {
  const u = new URL(window.location.href);
  const p = u.searchParams;
  const cleanPath = u.pathname.replace(/\/index\.html$/i, '').replace(/\/$/, '');
  const parts = cleanPath.split('/').filter(Boolean);
  const hashParts = (u.hash && u.hash.startsWith('#/')) ? u.hash.slice(2).split('/').filter(Boolean) : [];
  
  // Skip folder name (e.g., 'winegallery'), take the rest
  let pathRestaurant = null;
  let pathMenu = null;
  
  if (hashParts.length) {
    pathRestaurant = hashParts[0] || null;
    pathMenu = hashParts[1] || null;
  } else if (parts.length >= 1) {
    // If last part is a known folder name, skip it
    const lastPart = parts[parts.length - 1];
    if (lastPart === 'winegallery') {
      // Root path like /winegallery/, parts after folder
      pathRestaurant = parts.length > 1 ? parts[parts.length - 2] : null;
      pathMenu = parts.length > 2 ? parts[parts.length - 3] : null;
    } else if (parts.length >= 1) {
      // Direct path like /novikov or /novikov/wine
      pathRestaurant = parts[0];
      pathMenu = parts[1] || null;
    }
  }

  return {
    r: pathRestaurant || p.get('r'),
    menu: (pathMenu === 'inventory' ? INVENTORY_MENU_KEY : pathMenu) || p.get('menu'),
    section: normalizeSectionKey(p.get('section')),
    w: p.get('w')
  };
}

function buildPath(r, menu) {
  if (shouldUseHashRouting()) {
    const bp = getBasePath();
    const base = bp.endsWith('/') ? bp : `${bp}/`;
    if (!r) return base;
    const routeMenu = menu === INVENTORY_MENU_KEY ? 'inventory' : menu;
    const suffix = routeMenu ? `${r}/${routeMenu}` : `${r}`;
    return `${base}#/${suffix}`;
  }
  if (!r) return '/';
  const routeMenu = menu === INVENTORY_MENU_KEY ? 'inventory' : menu;
  if (!routeMenu) return `/${r}`;
  return `/${r}/${routeMenu}`;
}

function writeUrlParams(next, mode = 'replace') {
  const u = new URL(window.location.href);
  const p = u.searchParams;

  const targetRestaurant = next.r !== undefined ? next.r : state.restaurantId;
  const targetMenu = next.menu !== undefined ? next.menu : state.menuKey;

  p.delete('r');
  p.delete('menu');
  if (next.section !== undefined) {
    if (next.section && next.section !== 'all') p.set('section', next.section); else p.delete('section');
  }
  if (next.w !== undefined) {
    if (next.w) p.set('w', next.w); else p.delete('w');
  }

  const newPath = buildPath(targetRestaurant, targetMenu);
  const newUrl = newPath + (p.toString() ? '?' + p.toString() : '');

  if (mode === 'push') history.pushState(null, '', newUrl);
  else history.replaceState(null, '', newUrl);
}

function syncUrl(mode = 'replace') {
  writeUrlParams({
    r: state.restaurantId,
    menu: state.menuKey,
    section: state.activeSection,
    w: state.modalWineId
  }, mode);
}

/**
 * =========================
 * 3) CSV parsing + mapping
 * =========================
 */
function parseCSV(text) {
  const rows = [];
  let row = [];
  let cur = '';
  let inQ = false;

  for (let i=0; i<text.length; i++) {
    const ch = text[i];
    const next = text[i+1];

    if (inQ) {
      if (ch === '"' && next === '"') { cur += '"'; i++; }
      else if (ch === '"') inQ = false;
      else cur += ch;
    } else {
      if (ch === '"') inQ = true;
      else if (ch === ',') { row.push(cur); cur=''; }
      else if (ch === '\n') { row.push(cur); rows.push(row); row=[]; cur=''; }
      else if (ch === '\r') { /* ignore */ }
      else cur += ch;
    }
  }
  if (cur.length || row.length) { row.push(cur); rows.push(row); }

  return rows;
}

function csvToObjects(csvText) {
  const rows = parseCSV(csvText);
  if (!rows.length) return [];
  const headers = rows[0].map(h => safe(h).trim());
  const objects = [];

  for (let i=1; i<rows.length; i++) {
    const r = rows[i];
    const obj = {};
    for (let j=0; j<headers.length; j++) {
      const key = headers[j];
      const value = r[j] ?? '';
      obj[key] = value;
      const lowerKey = key.toLowerCase();
      if (!obj.hasOwnProperty(lowerKey)) {
        obj[lowerKey] = value;
      }
    }
    objects.push(obj);
  }
  return objects;
}

function toBool(v) {
  const s = String(v ?? '')
    .replace(/\u00A0/g, ' ')
    .trim()
    .toLowerCase();

  if (s === '') return true;
  return ['1', 'true', 'yes', 'y', 'on'].includes(s);
}

function buildSearchHaystack(parts) {
  return parts
    .map(v => String(v ?? '').replace(/\u00A0/g, ' ').trim().toLowerCase())
    .filter(Boolean)
    .join(' ');
}

function parseNotesChips(s) {
  const raw = String(s || '')
    .split(/[|,;]/g)
    .map(x => x.trim().replace(/_/g, ' '))
    .filter(Boolean);

  const seenRaw = new Set();
  const resolved = [];

  raw.forEach((item, sourceOrder) => {
    const rawKey = item.toLowerCase();
    if (seenRaw.has(rawKey)) return;
    seenRaw.add(rawKey);

    const token = resolveTokenEntry(item);
    if (!token || !token.icon) return;
    if (resolved.some(x => x.key === token.key)) return;

    const priority = NOTE_PRIORITY_INDEX.has(token.key)
      ? NOTE_PRIORITY_INDEX.get(token.key)
      : Number.MAX_SAFE_INTEGER;

    resolved.push({ key: token.key, priority, sourceOrder });
  });

  resolved.sort((a, b) => {
    if (a.priority !== b.priority) return a.priority - b.priority;
    return a.sourceOrder - b.sourceOrder;
  });

  return resolved.slice(0, 3).map(x => x.key);
}


function buildShortDescription(text) {
  const raw = String(text || '').replace(/\s+/g, ' ').trim();
  if (!raw) return '';
  const cleaned = raw.replace(/^this wine\s+(is|offers|presents|delivers)\s+/i, '');
  const sentences = cleaned.split(/(?<=[.!?])\s+/).filter(Boolean);
  return sentences.slice(0, 3).join(' ');
}

function buildCardChips(w) {
  const chips = [];
  const section = labelForSectionKey(w.sectionKey);
  if (section) chips.push(section);
  if (chips.length < 2 && safe(w.grape)) chips.push(w.grape);

  const seen = new Set();
  const out = [];
  for (const c of chips) {
    const key = String(c || '').toLowerCase();
    if (!key || seen.has(key)) continue;
    seen.add(key);
    out.push(c);
    if (out.length >= 2) break;
  }
  return out;
}

function buildPairingList(text) {
  const raw = String(text || '')
    .split(/[|,;/]/g)
    .map(x => x.trim())
    .filter(Boolean);
  return raw.slice(0, 4);
}

function getNoteTokensForWine(w) {
  return parseNotesChips(w.notes);
}

function readProfileValue(raw, keys) {
  for (const key of keys) {
    if (raw && raw[key] !== undefined && raw[key] !== null) {
      const val = Number(String(raw[key]).replace(',', '.'));
      if (isFinite(val)) {
        if (val <= 5) return Math.max(0, Math.min(100, (val - 1) * 25));
        return Math.max(0, Math.min(100, val));
      }
    }
  }
  return null;
}

function inferProfile(sectionKey = '') {
  const key = String(sectionKey || '').toLowerCase();
  if (key.includes('red')) {
    return { body: 72, acidity: 55, sweetness: 12, texture: 72, textureLabel: ['Smooth', 'Firm'] };
  }
  if (key.includes('sparkling') || key.includes('champagne')) {
    return { body: 30, acidity: 72, sweetness: 22, texture: 28, textureLabel: ['Crisp', 'Creamy'] };
  }
  if (key.includes('rose')) {
    return { body: 42, acidity: 60, sweetness: 18, texture: 40, textureLabel: ['Crisp', 'Creamy'] };
  }
  if (key.includes('dessert')) {
    return { body: 62, acidity: 40, sweetness: 82, texture: 60, textureLabel: ['Crisp', 'Creamy'] };
  }
  return { body: 38, acidity: 64, sweetness: 12, texture: 36, textureLabel: ['Crisp', 'Creamy'] };
}

function getWineProfile(w) {
  const raw = w?.raw || {};
  const base = inferProfile(w.sectionKey);
  const body = readProfileValue(raw, ['body', 'body_level', 'profile_body']) ?? base.body;
  const acidity = readProfileValue(raw, ['acidity', 'acidity_level', 'profile_acidity']) ?? base.acidity;
  const sweetness = readProfileValue(raw, ['sweetness', 'sweetness_level', 'profile_sweetness']) ?? base.sweetness;
  const texture = readProfileValue(raw, ['texture', 'texture_level', 'profile_texture']) ?? base.texture;
  return { body, acidity, sweetness, texture, textureLabel: base.textureLabel };
}

const TOKEN_DICTIONARY = NOTE_ICON_FILES.reduce((acc, file) => {

  const label = raw.replace(/(^|[\s-])\w/g, (m) => m.toUpperCase());

// Единый глобальный приоритет показа нот для всех карточек и языков.
// Базируется на текущих данных меню: сначала фруктовый профиль,
// затем цветочные/травяные/пряные, затем минерально-землистые и выдержка.
const NOTE_PRIORITY_ORDER = [
  'citrus',
  'tree fruit',
  'tropical fruit',
  'floral',
  'red fruit',
  'black fruit',
  'dried fruit',
  'herbal',
  'savory herb',

  'burnt',
  'chemical',
  'sulfur',
];

const NOTE_PRIORITY_INDEX = new Map(
  NOTE_PRIORITY_ORDER.map((key, idx) => [key, idx])
);

function resolveTokenEntry(tokenStr) {
  const normalized = String(tokenStr || '').toLowerCase().trim();
  if (!normalized) return null;

  if (TOKEN_DICTIONARY[normalized]) {
    return { key: normalized, ...TOKEN_DICTIONARY[normalized] };
  }

  return null;
}

}

/**
 * =========================
 * 4) Data loading (configs + CSV) + caching
 * =========================
 */
async function fetchJson(url) {
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error(`HTTP ${res.status} for ${url}`);
  return await res.json();
}

async function fetchText(url) {
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error(`HTTP ${res.status} for ${url}`);
  return await res.text();
}

function getBasePath() {
  // Используем сохранённый basePath, если он есть
  if (state.basePath !== null) {
    return state.basePath;
  }
  
  // Определяем и сохраняем basePath один раз
  const path = window.location.pathname;
  
  // Если URL содержит /winegallery/, значит index.html по адресу /winegallery/index.html
  // и конфиги находятся в /winegallery/configs/
  if (path.includes('/winegallery/')) {
    state.basePath = '/winegallery/';
    return state.basePath;
  }
  
  // Если сервер запущен из папки winegallery, конфиги в /configs/
  state.basePath = '/';
  return state.basePath;
}

async function loadConfigsIndex() {
  if (state.cache.configsIndex) return state.cache.configsIndex;
  const basePath = getBasePath();
  const idx = await fetchJson(`${basePath}configs/index.json`);
  state.cache.configsIndex = idx;
  return idx;
}

async function loadRestaurantConfig(restaurantId) {
  if (state.cache.configByRestaurant.has(restaurantId)) return state.cache.configByRestaurant.get(restaurantId);
  const basePath = getBasePath();
  const cfg = await fetchJson(`${basePath}configs/${restaurantId}.json`);
  state.cache.configByRestaurant.set(restaurantId, cfg);
  return cfg;
}

async function loadCSV(csvUrl) {
  if (state.cache.csvByUrl.has(csvUrl)) return state.cache.csvByUrl.get(csvUrl);
  const text = await fetchText(csvUrl);
  state.cache.csvByUrl.set(csvUrl, text);
  return text;
}

function applyThemeFromConfig(config) {
  const vars = config?.theme?.variables || {};
  const root = document.documentElement;
  for (const [k, v] of Object.entries(vars)) {
    if (!k || !v) continue;
    if (k === '--bg1' || k === '--bg2') continue;
    root.style.setProperty(k, v);
  }
  if (config?.theme?.font) root.style.setProperty('--font', config.theme.font);
}

function getInventoryFeatureConfig(config = state.config) {
  return config?.features?.inventory || null;
}

function isInventoryFeatureEnabled(config = state.config) {
  return !!getInventoryFeatureConfig(config)?.enabled;
}

function isInventoryRouteKey(menuKey) {
  return menuKey === INVENTORY_MENU_KEY;
}

function normalizeMenus(config) {
  if (Array.isArray(config?.menus) && config.menus.length) {
    const inventoryEnabled = isInventoryFeatureEnabled(config);
    const menus = [...config.menus].filter((menu) => {
      if (!inventoryEnabled && isInventoryMenu(menu)) return false;
      return true;
    });

    const hasInventory = menus.some(m => m?.key === INVENTORY_MENU_KEY);
    if (inventoryEnabled && !hasInventory) {
      const inventoryFeature = getInventoryFeatureConfig(config) || {};
      menus.push({
        key: INVENTORY_MENU_KEY,
        title: inventoryFeature.title || 'Inventory Mode',
        type: 'inventory',
        layout: 'inventory'
      });
    }
    return menus;
  }
  if (config?.csvUrl) {
    const menus = [{
      key: 'wine',
      title: 'Wine List',
      type: 'wine',
      layout: 'cards',
      csvUrl: config.csvUrl
    }];
    return menus;
  }
  return [];
}

function getMenuByKey(key) {
  return (state.menus || []).find(m => m.key === key) || null;
}

function getCsvUrlForLang(lang) {
  const menuCsv = state.menuConfig?.csvUrl;
  const fallbackCsv = state.config?.csvUrl;
  const source = menuCsv || fallbackCsv || {};
  return source?.[lang] || source?.en || null;

function isInventoryMenu(menu) {
  return !!menu && (menu.key === INVENTORY_MENU_KEY || menu.type === 'inventory' || menu.layout === 'inventory');
}

function isInventoryMode() {
  return isInventoryMenu(state.menuConfig);
}

function isPastryMenu(menu) {
  return !!menu && (menu.key === 'pastry' || menu.type === 'pastry');
}

function isPastryMode() {
  return isPastryMenu(state.menuConfig);
}

function extractPastryTitleAndBadges(rawTitle) {
  const title = String(rawTitle || '').trim();
  const badges = [];
  const badgeSet = new Set(['VE', 'GF', 'V']);

  const tokens = title.split(/\s+/).filter(Boolean);
  const kept = [];
  for (const token of tokens) {
    const normalized = token.replace(/[^A-Za-z]/g, '').toUpperCase();
    if (badgeSet.has(normalized)) {
      if (!badges.includes(normalized)) badges.push(normalized);
      continue;
    }
    kept.push(token);
  }

  return {
    title: kept.join(' ').trim(),
    badges,
  };
}

function mapPastryRow(x, idx) {
  const rawTitle = String(x.name ?? x.title ?? '').trim();
  const parsed = extractPastryTitleAndBadges(rawTitle);
  const title = parsed.title || rawTitle;
  const description = String(x.description ?? '').trim();
  const rawPrice = String(x.price ?? '').replace(',', '.').trim();
  const parsedPrice = Number(rawPrice);
  const priceBottle = isFinite(parsedPrice) ? parsedPrice : '';
  const id = String(x.id ?? x.no ?? idx + 1).trim();

  const rawImage = String(x.image ?? '').trim();
  const imageUrl = rawImage ? 'assets/pastry/' + rawImage : '';

  return {
    id,
    title,
    description,
    priceBottle,
    imageUrl,
    badges: parsed.badges,
    searchHaystack: buildSearchHaystack([title, description, rawPrice]),
    raw: x,
    visible: true,
    available: true,
  };
}

  if (searchWrap) searchWrap.classList.add('hiddenControl');
  const inventoryView = $('inventoryView');
  if (inventoryView) inventoryView.classList.remove('hidden');
}

function hideInventoryShell() {
  const tabs = $('sectionTabs');
  const grid = $('grid');
  const topMenuNav = $('topMenuNav');
  const topbar = document.querySelector('.topbar');
  if (tabs) tabs.classList.remove('hidden');
  if (grid) grid.classList.remove('hidden');
  if (topMenuNav) topMenuNav.classList.remove('hidden');
  if (topbar) topbar.classList.remove('inventoryModeTopbar');
  const searchWrap = $('searchWrap');
  if (searchWrap) searchWrap.classList.remove('hiddenControl');
  const inventoryView = $('inventoryView');
  if (inventoryView) inventoryView.classList.add('hidden');
}

function getInventoryModeModule() {
  if (inventoryModeModule) return inventoryModeModule;
  if (typeof window.createInventoryModeModule !== 'function') {
    throw new Error('Inventory module factory is not available');
  }

  inventoryModeModule = window.createInventoryModeModule({
    getState: () => state,
    byId: $,
    loadCSV,
    csvToObjects,
    getMenuByKey,
    setStatus,
    t,
    getStrings: () => inventoryStringsForLang(state.lang),
    constants: {
      menuKey: INVENTORY_MENU_KEY,
      storagePrefix: INVENTORY_STORAGE_PREFIX,
      units: INVENTORY_UNITS,
      reasons: INVENTORY_REASONS
    }
  });

  return inventoryModeModule;
}

function showWineView() {
  if (inventoryModeModule && typeof inventoryModeModule.unmount === 'function') {
    inventoryModeModule.unmount();
  }
  hideInventoryShell();
}

function hideWineView() {
  showInventoryShell();
}

async function renderInventoryMode() {
  hideWineView();
  closeModal(false);
  state.modalWineId = null;

  const module = getInventoryModeModule();
  await module.mount();
  showInventoryShell();
}

function authStorageKey() {
  return `wg_auth_${state.restaurantId}`;
}

function readAuthState() {
  const key = authStorageKey();
  return sessionStorage.getItem(key) === '1';
}

function setAuthState(role) {
  const key = authStorageKey();
  sessionStorage.setItem(key, '1');
  sessionStorage.setItem(`${key}_role`, role || '');
  state.isAuthenticated = true;
  state.authRole = role || null;
}

function clearAuthState() {
  const key = authStorageKey();
  sessionStorage.removeItem(key);
  sessionStorage.removeItem(`${key}_role`);
  state.isAuthenticated = false;
  state.authRole = null;
}

function showStartScreen() {
  const startScreen = $('startScreen');
  const appWrap = $('appWrap');
  if (startScreen) {
    startScreen.style.display = 'flex';
    startScreen.setAttribute('aria-hidden', 'false');
    startScreen.inert = false;
  }
  if (appWrap) appWrap.classList.add('hidden');
}

function showAppScreen() {
  const startScreen = $('startScreen');
  if (startScreen) {
    if (startScreen.contains(document.activeElement)) {
      document.activeElement.blur();
    }
    startScreen.inert = true;
    startScreen.setAttribute('aria-hidden', 'true');
    startScreen.style.display = 'none';
  }
  
  const appWrap = $('appWrap');
  if (appWrap) {
    appWrap.classList.remove('hidden');
  }
}

function renderHosteraStartLockup() {
  const startLockup = $('startLockup');
  const startTitle = $('startTitle');
  const startSubtitle = $('startSubtitle');
  const startBrand = document.querySelector('.startBrand');
  if (!startLockup || !startTitle || !startSubtitle) return;

  if (startBrand) startBrand.classList.add('hosteraLockup');

  startTitle.style.display = '';
  startTitle.textContent = 'HOSTERA';
  startSubtitle.style.display = '';
  startSubtitle.textContent = 'a new era of hospitality';

  const pngPath = normalizeAssetPath('assets/hostera-lockup.png');
  const webpPath = normalizeAssetPath('assets/hostera-lockup.webp');

  startLockup.style.display = 'none';
  startLockup.onerror = () => {
    if (startLockup.src.endsWith('hostera-lockup.webp')) {
      startLockup.src = pngPath;
      return;
    }
    startLockup.style.display = 'none';
    startTitle.style.display = '';
    startSubtitle.style.display = '';
  };
  startLockup.onload = () => {
    startLockup.style.display = 'block';
    startTitle.style.display = 'none';
    startSubtitle.style.display = 'none';
  };
  startLockup.src = webpPath;
}

function renderStartBranding() {
  const logo = state.config?.branding?.logo || state.config?.logoUrl || '';
  const normalizedLogo = normalizeAssetPath(logo);
  const isNovikov = state.restaurantId === 'novikov_bh';
  
  const startLogo = $('startLogo');
  const startLockup = $('startLockup');
  const startTitle = $('startTitle');
  const startSubtitle = $('startSubtitle');
  const loginForm = $('loginForm');
  const startBrand = document.querySelector('.startBrand');
  const startCard = document.querySelector('.startCard');
  
  // Only show logo if we're past global login (i.e., if loginForm is hidden)
  if (loginForm && !loginForm.classList.contains('hidden')) {
    if (startBrand) startBrand.classList.remove('logoOnly');
    if (startCard) startCard.classList.remove('logoOnlyScreen');
    // Global login form is visible - don't show restaurant branding yet
    if (startLogo) startLogo.style.display = 'none';
    renderHosteraStartLockup();
  } else {
    if (startBrand) startBrand.classList.remove('hosteraLockup');
    // Restaurant is loaded - show branding
    if (startBrand) {
      if (isNovikov) startBrand.classList.add('logoOnly');
      else startBrand.classList.remove('logoOnly');
    }
    if (startCard) {
      if (isNovikov) startCard.classList.add('logoOnlyScreen');
      else startCard.classList.remove('logoOnlyScreen');
    }
    if (startLogo) {
      startLogo.src = normalizedLogo;
      startLogo.style.display = 'inline-block';
    }
    if (startLockup) {
      startLockup.style.display = 'none';
    }
    if (startTitle) {
      if (isNovikov) {
        startTitle.style.display = 'none';
      } else {
        startTitle.style.display = '';
        startTitle.textContent = state.config?.name || state.restaurantId || 'HOSTERA';
      }
    }
    if (startSubtitle) {
      if (isNovikov) {
        startSubtitle.style.display = 'none';
      } else {
        startSubtitle.style.display = '';
        startSubtitle.textContent = state.config?.branding?.subtitle || '';
      }
    }
  }
  
}

function renderMenuList() {
  const list = $('menuList');
  if (!list) return;
  
  list.innerHTML = '';

  const inventoryMenu = state.menus.find((m) => m?.key === INVENTORY_MENU_KEY);
  const regularMenus = (state.menus || []).filter((m) => !isInventoryMenu(m));

  if (inventoryMenu) {
    const openMenuBtn = document.createElement('button');
    openMenuBtn.type = 'button';
    openMenuBtn.className = 'menuBtn';
    openMenuBtn.textContent = 'Open Menu';

    const menuToOpen = regularMenus.find((m) => m?.key === 'wine')
      || regularMenus.find((m) => !!(m?.csvUrl?.en || m?.csvUrl?.[state.lang]))
      || regularMenus[0];

    if (menuToOpen?.key) {
      openMenuBtn.onclick = () => enterMenu(menuToOpen.key);
    } else {
      openMenuBtn.disabled = true;
      openMenuBtn.textContent = `Open Menu (${t('comingSoon')})`;
    }
    list.appendChild(openMenuBtn);

    const inventoryBtn = document.createElement('button');
    inventoryBtn.type = 'button';
    inventoryBtn.className = 'menuBtn';
    inventoryBtn.textContent = inventoryMenu.title || 'Inventory Mode';
    inventoryBtn.onclick = () => enterMenu(INVENTORY_MENU_KEY);
    list.appendChild(inventoryBtn);
    return;
  }

  for (const menu of regularMenus) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'menuBtn';
    btn.textContent = menuTitleForLang(menu);

    const hasCsv = !!(menu?.csvUrl?.en || menu?.csvUrl?.[state.lang]);
    if (!hasCsv) {
      btn.disabled = true;
      btn.textContent = `${menuTitleForLang(menu)} (${t('comingSoon')})`;
    }

    btn.onclick = () => enterMenu(menu.key);
    list.appendChild(btn);
  }
}

function renderMenuSelect() {
  const ms = $('menuSelect');
  if (!ms) {
    return;
  }
  ms.innerHTML = '';

  for (const menu of state.menus) {
    const opt = document.createElement('option');
    opt.value = menu.key;
    opt.textContent = menuTitleForLang(menu);
    if (menu.key === state.menuKey) opt.selected = true;
    ms.appendChild(opt);
  }

  renderTopMenuNav();
}

function renderGlobalLoginForm() {
  showStartScreen();
  const loginForm = $('loginForm');
  const loginError = $('loginError');
  const loginInput = $('loginInput');
  const passwordInput = $('passwordInput');
  
  loginForm.classList.remove('hidden');
  $('menuList').classList.add('hidden');
  
  // Safely hide restaurant selector and branding elements
  const restaurantSelector = $('restaurantSelector');
  if (restaurantSelector) restaurantSelector.style.display = 'none';
  const startBrand = document.querySelector('.startBrand');
  if (startBrand) startBrand.classList.remove('logoOnly');
  const startCard = document.querySelector('.startCard');
  if (startCard) startCard.classList.remove('logoOnlyScreen');
  
  const startLogo = $('startLogo');
  if (startLogo) startLogo.style.display = 'none';

  const startLockup = $('startLockup');
  if (startLockup) startLockup.style.display = 'none';
  renderHosteraStartLockup();
  
  loginError.textContent = '';
  loginInput.value = '';
  passwordInput.value = '';
  loginInput.placeholder = t('login');
  passwordInput.placeholder = t('password');
  applyLanguageUI();
  
  // Remove old onsubmit handler
  loginForm.onsubmit = async (e) => {
    e.preventDefault();
    loginError.textContent = '';
    
    const login = loginInput.value?.trim() || '';
    const pass = passwordInput.value?.trim() || '';
    
    if (!login || !pass) {
      loginError.textContent = 'Please enter login and password.';
      return;
    }
    
    try {
      const user = await validateGlobalCredentials(login, pass);
      
      if (!user) {
        loginError.textContent = 'Invalid login or password.';
        return;
      }
      
      // Success - load restaurant and proceed
      state.restaurantId = user.restaurantId;
      
      // Don't change URL yet - wait until user selects a menu
      // Changing URL to Pretty URL like /novikov_bh causes browser to try loading that page (404)
      // URL will be updated when user enters a menu via enterMenu()
      state.isLoadingRestaurant = true;
      
      try {
        state.config = await loadRestaurantConfig(state.restaurantId);
      } catch (configErr) {
        console.error('[Login] Config load error:', configErr);
        loginError.textContent = 'Error loading restaurant config: ' + configErr.message;
        return;
      }
      
      applyThemeFromConfig(state.config);
      
      state.menus = normalizeMenus(state.config);
      state.menuKey = null;
      state.menuConfig = null;
      state.lang = 'en';

      applyLanguageUI();
      
      setAuthState(user.role);
      
      loginForm.classList.add('hidden');
      
      // Show menuList and remove aria-hidden from startScreen since content is now visible
      const menuList = $('menuList');
      if (menuList) menuList.classList.remove('hidden');
      
      const startScreen = $('startScreen');
      if (startScreen) {
        startScreen.setAttribute('aria-hidden', 'false');
      }
      
      // Don't hide startScreen - menuList is inside it!
      // If we hide startScreen, menuList will be hidden too
      // Keep startScreen visible for menu selection
      
      renderStartBranding();

      renderMenuSelect();
      bindSettingsMenu();
      
      renderMenuList();

      bindLogoutHandler();

      $('logoutBtn').style.display = 'inline-flex';
      
      setStatus(t('ready'), 'good');
    } catch (err) {
      console.error('[Login] Error:', err);
      loginError.textContent = 'Error: ' + err.message;
    }
  };
}


function requiresAuth(config) {
  return config?.auth?.mode === 'local' && Array.isArray(config?.auth?.users) && config.auth.users.length > 0;
}

async function validateGlobalCredentials(login, password) {
  try {
    const basePath = getBasePath();
    const authUrl = `${basePath}configs/auth.json?v=` + Date.now();
    const authIndex = await fetchJson(authUrl);
    const user = authIndex.users?.find(u => u.login === login && u.password === password);
    return user || null;
  } catch (e) {
    console.error('[Auth] Error loading auth config:', e);
    throw e;
  }
}

function validateCredentials(login, password) {
  const users = state.config?.auth?.users || [];
  return users.find(u => u.login === login && u.password === password) || null;
}

async function enterMenu(menuKey) {
  if (!menuKey) return;
  const wasInventoryMode = isInventoryMode();
  const nextMenu = getMenuByKey(menuKey);
  const nextIsInventoryMode = isInventoryMenu(nextMenu);
  if (!wasInventoryMode && nextIsInventoryMode) {
    resetWineSearchState();
  }
  if (isInventoryRouteKey(menuKey) && !isInventoryFeatureEnabled()) {
    showStartScreen();
    renderMenuList();
    return;
  }

  if (!nextMenu) {
    showStartScreen();
    renderMenuList();
    return;
  }

  state.menuKey = menuKey;
  state.menuConfig = nextMenu;

  renderMenuSelect();

  // Set topbar branding (logo and restaurant name)
  const brandLogo = state.config?.branding?.logo || state.config?.logoUrl || '';
  $('restaurantName').textContent = state.config.name || state.restaurantId;
  $('logo').src = normalizeAssetPath(brandLogo);
  $('logo').style.display = brandLogo ? 'inline-block' : 'none';
  
  showAppScreen();

  writeUrlParams({ menu: menuKey, w: null, section: 'all' }, 'push');

  if (isInventoryMode()) {
    await renderInventoryMode();
    renderTopMenuNav();
    return;
  }

  if (wasInventoryMode) {
    resetWineSearchState();
  }

  showWineView();
  
  // Форсируем загрузку данных, даже если язык не изменился
  state.wines = [];
  await loadWinesForCurrentMenu();
}

async function loadWinesForCurrentMenu() {
  if (isInventoryMode()) {
    await renderInventoryMode();
    return;
  }

  if (!state.menuKey) {
    return;
  }

  const csvUrl = getCsvUrlForLang(state.lang);
  
  if (!csvUrl) {
    setStatus(t('menuNotConfigured'), 'idle');
    return;
  }

  try {
    setStatus(t('loadingWines'), 'idle');
    const csvText = await loadCSV(csvUrl);
    
    const raw = csvToObjects(csvText);

    if (isPastryMode()) {
      state.wines = raw
        .map((x, idx) => mapPastryRow(x, idx))
        .filter((w) => w.id && w.title);

      state.sectionsEffective = [];
      state.activeSection = 'all';

      setStatus(t('ready'), 'good');
      filterAndRender();
      return;
    }

    function toNum(v) {
      const n = Number(String(v ?? '').replace(',', '.').trim());
      return isFinite(n) ? n : null;
    }
    
    function buildTitle(x) {
      const producer = String(x.producer ?? '').trim();
      const name = String(x.name ?? '').trim();
      const vintage = String(x.vintage ?? '').trim();
      const base = [producer, name].filter(Boolean).join(' ');
      return [base, vintage].filter(Boolean).join(' ');
    }
    
    function buildSub(x) {
      const country = String(x.country ?? '').trim();
      const region = String(x.region ?? '').trim();
      const grape = String(x.grape ?? '').trim();
      return [country, region, grape].filter(Boolean).join(' • ');
    }

    state.wines = raw
      .map(x => {
        const section = String(x.section ?? x.section_key ?? '').trim();
        const sectionKeyRaw = String(x.section_key ?? '').trim();
        const sectionKey = normalizeSectionKey(sectionKeyRaw || section);

        const visible = toBool(x.visible);
        const available = toBool(x.is_available);

        const producer = String(x.producer ?? '').trim();
        const country = String(x.country ?? '').trim();
        const region = String(x.region ?? '').trim();
        const grape = String(x.grape ?? '').trim();

        const hay = buildSearchHaystack([
          buildTitle(x),
          producer,
          country,
          region,
          grape
        ]);

        return {
          id: String(x.id ?? x.wine_id ?? '').trim(),
          title: buildTitle(x),
          sub: buildSub(x),

          section,
          sectionKey,

          producer,
          country,
          region,
          grape,
          searchHaystack: hay,

          description: String(x.story ?? '').trim(),
          notes: String(x.notes ?? '').trim(),
          pairing: String(x.pairing ?? '').trim(),

          imageUrl: String(x.bottle_img ?? x.primary_image_url ?? '').trim(),
          priceGlass: x.btg_price ?? '',
          priceBottle: x.bottle_price ?? '',

          order: toNum(x.order),
          raw: x,

          visible,
          available,
        };
      })
      .filter(w => w.id && w.title)
      .filter(w => w.visible);

    state.sectionsEffective = computeSectionsEffective(state.wines, state.config, state.lang);
    state.activeSection = 'all';

    setStatus(t('ready'), 'good');
    filterAndRender();
    
  } catch (err) {
    console.error('[LoadWines] Error:', err);
    setStatus('Error: ' + err.message, 'idle');
  }
}

async function setMenu(nextMenuKey, opts = {}) {
  const { fromPopstate = false } = opts;
  if (!nextMenuKey || nextMenuKey === state.menuKey) return;
  const wasInventoryMode = isInventoryMode();
  const nextMenu = getMenuByKey(nextMenuKey);
  const nextIsInventoryMode = isInventoryMenu(nextMenu);
  if (!wasInventoryMode && nextIsInventoryMode) {
    resetWineSearchState();
  }

  if (isInventoryRouteKey(nextMenuKey) && !isInventoryFeatureEnabled()) {
    state.menuKey = null;
    state.menuConfig = null;
    showStartScreen();
    $('menuList').classList.remove('hidden');
    renderMenuList();
    if (!fromPopstate) writeUrlParams({ menu: null, w: null, section: 'all' }, 'push');
    return;
  }

  if (!nextMenu) {
    state.menuKey = null;
    state.menuConfig = null;
    showStartScreen();
    $('menuList').classList.remove('hidden');
    renderMenuList();
    return;
  }

  state.menuKey = nextMenuKey;
  state.menuConfig = nextMenu;
  state.activeSection = 'all';

  renderMenuSelect();

  showAppScreen();

  closeModal(false);
  state.modalWineId = null;

  if (!fromPopstate) {
    writeUrlParams({ menu: nextMenuKey, w: null, section: 'all' }, 'push');
  }

  if (isInventoryMode()) {
    await renderInventoryMode();
    return;
  }

  if (wasInventoryMode) {
    resetWineSearchState();
  }

  showWineView();

  await loadWinesForCurrentMenu();
}

/**
 * =========================
 * 5) Sections logic (Sprint 2.1)
 * =========================
 */
function computeSectionsEffective(wines, config, lang) {
  const labelsFromData = {};
  const keysInData = new Set();

  for (const w of wines) {
    const k = w.sectionKey || normalizeSectionKey(w.section);
    if (k) keysInData.add(k);
    if (k && !labelsFromData[k]) labelsFromData[k] = w.section;
  }

  const labelsFromConfig = {};
  const rawOrderCandidate =
    (config?.sectionsOrderByLang && lang && config.sectionsOrderByLang[lang]) ??
    config?.sectionsOrder;

  const rawOrder = Array.isArray(rawOrderCandidate) ? rawOrderCandidate : [];

  const normalizedOrder = rawOrder
    .map(x => {
      const label = String(x ?? '').trim();
      const key = normalizeSectionKey(label);
      if (key && !labelsFromConfig[key]) labelsFromConfig[key] = label;
      return key;
    })
    .filter(Boolean);

  state.sectionLabels = { ...labelsFromData, ...labelsFromConfig };

  // Применить переопределение названий секций для конкретного языка
  if (config?.sectionLabelsOverride?.[lang]) {
    const override = config.sectionLabelsOverride[lang];
    state.sectionLabels = { ...state.sectionLabels, ...override };
  }

  if (normalizedOrder.length) {
    const effective = normalizedOrder.filter(k => keysInData.has(k));
    if (effective.length === 0 && keysInData.size > 0) {
      console.warn('[WineGallery] sectionsOrder задан, но не совпал ни с одной секцией в CSV. Показываю fallback (All + секции из данных). Проверь названия секций.');
      return Array.from(keysInData);
    }
    return effective;
  }

  return Array.from(keysInData);
}

function sectionAllowed(sectionKey) {
  const order = state.sectionsEffective;
  if (!order || order.length === 0) return true;
  return order.includes(sectionKey);
}

function labelForSectionKey(k) {
  return state.sectionLabels?.[k] || k;
}
